{% extends 'StudyHall/index.html' %}

{% block content %}
<div class="account-auth">

    <form method="post">
        <h1 class="auth-title">Login</h1>
        {% csrf_token %}
        {{form.as_p}}

        <button type="submit">Login</button>
        <p class="auth-par">Don't have an account? <a href="{% url 'register' %}">Register</a> </p>
    </form>
    

</div>



{% endblock %}
